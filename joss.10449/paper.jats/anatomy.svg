<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 560" width="1020" height="560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#495057"/>
    </marker>
    <style>
      .feature-key   { font-size: 18px; font-weight: 600; fill: #1e1e1e; }
      .feature-ver   { font-size: 13px; font-family: "Menlo", "Consolas", monospace; fill: #868e96; }
      .field-audio   { font-size: 16px; fill: #f08c00; font-weight: 600; }
      .field-frames  { font-size: 16px; fill: #9c36b5; font-weight: 600; }
      .field-text    { font-size: 16px; fill: #1e1e1e; font-weight: 600; }
      .hash          { font-size: 13px; font-family: "Menlo", "Consolas", monospace; }
      .legend-label  { font-size: 14px; fill: #e03131; font-weight: 700; }
      .legend-sub    { font-size: 12px; fill: #495057; }
      .section-rule  { stroke: #adb5bd; stroke-width: 1; stroke-dasharray: 3 3; }
    </style>
  </defs>

  <!-- ===================== LEGEND (left column) ===================== -->
  <g transform="translate(20, 25)">
    <rect x="0" y="0" width="230" height="230" rx="10" fill="#f8f9fa" stroke="#ced4da" stroke-width="1.5"/>
    <text x="115" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#212529">Legend</text>
    <line x1="15" y1="34" x2="215" y2="34" class="section-rule"/>

    <!-- Feature row -->
    <text x="18" y="58" class="legend-label">Feature Key</text>
    <text x="130" y="58" font-size="14" font-weight="600" fill="#1e1e1e">video/full</text>

    <text x="18" y="82" class="legend-label">Feature Version</text>
    <text x="130" y="82" font-size="13" font-family="Menlo, Consolas, monospace" fill="#868e96">57abcde</text>

    <line x1="15" y1="98" x2="215" y2="98" class="section-rule"/>

    <!-- Field row -->
    <text x="18" y="122" class="legend-label">Field Key</text>
    <text x="130" y="122" font-size="14" font-weight="600" fill="#f08c00">audio</text>

    <text x="18" y="146" class="legend-label">Field Version</text>
    <text x="130" y="146" font-size="13" font-family="Menlo, Consolas, monospace" fill="#868e96">a3f8b2c1</text>

    <line x1="15" y1="162" x2="215" y2="162" class="section-rule"/>

    <!-- Hash note -->
    <text x="18" y="186" font-size="13" font-weight="700" fill="#495057">hash</text>
    <text x="18" y="206" class="legend-sub">per-record version digest</text>
    <text x="18" y="222" class="legend-sub">computed via SQL in-store</text>
  </g>

  <!-- ===================== UPSTREAM FEATURE: video/full ===================== -->
  <g transform="translate(290, 175)">
    <rect x="0" y="0" width="220" height="170" rx="12" fill="#e7f5ff" stroke="#1e1e1e" stroke-width="2"/>
    <!-- header -->
    <text x="16" y="30" class="feature-key">video/full</text>
    <text x="16" y="50" class="feature-ver">57abcde</text>
    <line x1="12" y1="62" x2="208" y2="62" class="section-rule"/>
    <!-- audio field -->
    <text x="16" y="88" class="field-audio">audio</text>
    <text x="204" y="88" text-anchor="end" class="hash" fill="#f08c00">a3f8b2c1</text>
    <!-- frames field -->
    <text x="16" y="118" class="field-frames">frames</text>
    <text x="204" y="118" text-anchor="end" class="hash" fill="#9c36b5">b7d2e4f6</text>
    <line x1="12" y1="134" x2="208" y2="134" class="section-rule"/>
    <!-- hash note -->
    <text x="110" y="154" text-anchor="middle" font-size="12" fill="#495057">hash = sha256(code + upstream)</text>
  </g>

  <!-- ===================== DOWNSTREAM 1: transcript/whisper ===================== -->
  <g transform="translate(730, 60)">
    <rect x="0" y="0" width="260" height="150" rx="12" fill="#fff4e6" stroke="#1e1e1e" stroke-width="2"/>
    <text x="16" y="30" class="feature-key">transcript/whisper</text>
    <text x="16" y="50" class="feature-ver">gg1329</text>
    <line x1="12" y1="62" x2="248" y2="62" class="section-rule"/>
    <!-- text field depending on audio -->
    <text x="16" y="88" class="field-text">text</text>
    <text x="244" y="88" text-anchor="end" class="hash" fill="#495057">da15hga2</text>
    <!-- dependency annotation -->
    <text x="16" y="114" font-size="12" fill="#495057">depends on: </text>
    <text x="100" y="114" font-size="12" font-weight="600" fill="#f08c00">audio</text>
    <line x1="12" y1="126" x2="248" y2="126" class="section-rule"/>
    <text x="130" y="142" text-anchor="middle" font-size="11" fill="#868e96">downstream record version</text>
  </g>

  <!-- ===================== DOWNSTREAM 2: video/face_crop ===================== -->
  <g transform="translate(730, 310)">
    <rect x="0" y="0" width="260" height="170" rx="12" fill="#f3f0ff" stroke="#1e1e1e" stroke-width="2"/>
    <text x="16" y="30" class="feature-key">video/face_crop</text>
    <text x="16" y="50" class="feature-ver">doan18na</text>
    <line x1="12" y1="62" x2="248" y2="62" class="section-rule"/>
    <!-- audio (unchanged propagation from upstream) -->
    <text x="16" y="88" class="field-audio">audio</text>
    <text x="244" y="88" text-anchor="end" class="hash" fill="#f08c00">ak2jn812</text>
    <!-- frames (changed) -->
    <text x="16" y="118" class="field-frames">frames</text>
    <text x="244" y="118" text-anchor="end" class="hash" fill="#9c36b5">df18sjn4</text>
    <line x1="12" y1="134" x2="248" y2="134" class="section-rule"/>
    <text x="130" y="154" text-anchor="middle" font-size="11" fill="#868e96">both fields derive from upstream</text>
  </g>

  <!-- ===================== ARROWS ===================== -->
  <!-- video/full (audio) -> transcript/whisper (text)
       source right-middle of audio row ~ (510, 263)
       target left of transcript box  (730, 135) -->
  <path d="M 510 263 C 600 263, 640 135, 730 135" fill="none" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="595" y="188" font-size="12" fill="#495057" font-style="italic">audio dep</text>

  <!-- video/full (frames) -> video/face_crop (frames)
       source right-middle of frames row (510, 293)
       target left of face_crop box (730, 395) -->
  <path d="M 510 293 C 600 293, 640 395, 730 395" fill="none" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590" y="360" font-size="12" fill="#495057" font-style="italic">frames dep</text>

  <!-- video/full (audio) -> video/face_crop (audio) as secondary edge
       source right-middle of audio row (510, 263)
       target left of face_crop box, audio row (730, 368) -->
  <path d="M 510 263 C 620 263, 620 368, 730 368" fill="none" stroke="#495057" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- ===================== TITLE / CAPTION ===================== -->
  <text x="510" y="525" text-anchor="middle" font-size="13" fill="#212529">
    Field-level version propagation: hashes travel along dependency edges at record granularity.
  </text>
</svg>
